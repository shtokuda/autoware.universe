trajectory_modifier_params:
  plugin_names:
    type: string_array
    default_value:
      - autoware::trajectory_modifier::plugin::ObstacleStop
      - autoware::trajectory_modifier::plugin::StopPointFixer
      - autoware::trajectory_modifier::plugin::VelocityModifier
    description: List of plugin names to load
    read_only: false
  use_stop_point_fixer:
    type: bool
    default_value: true
    description: Enable the use of stop point fixer
    read_only: false
  use_obstacle_stop:
    type: bool
    default_value: true
    description: Enable the use of obstacle stop
    read_only: false
  use_velocity_modifier:
    type: bool
    default_value: true
    description: Enable the use of velocity modifier
    read_only: false
  use_surround_obstacle_stop:
    type: bool
    default_value: false
    description: Enable the use of surround obstacle stop
    read_only: false
  use_traffic_light_stop:
    type: bool
    default_value: false
    description: Enable the use of traffic light stop
    read_only: false
  trajectory_time_step:
    type: double
    default_value: 0.1
    description: Time step for trajectory modification [s]
    read_only: false
    validation:
      bounds<>: [0.05, 1.0]

  stop_point_fixer:
    force_stop_long_stopped_trajectories:
      type: bool
      default_value: true
      description: Force zero velocity trajectory for trajectories with long stops
      read_only: false
    force_stop_close_stopped_trajectories:
      type: bool
      default_value: true
      description: Force zero velocity trajectory for trajectories with stops close to ego
      read_only: false
    velocity_threshold:
      type: double
      default_value: 0.25
      description: Velocity threshold below which ego vehicle is considered stationary [m/s]
      read_only: false
      validation:
        bounds<>: [0.0, 100.0]
    min_distance_threshold:
      type: double
      default_value: 1.0
      description: Minimum distance threshold to trigger trajectory replacement [m]
      read_only: false
      validation:
        bounds<>: [0.0, 100.0]
    min_stop_duration:
      type: double
      default_value: 0.5
      description: Minimum duration of stop to trigger trajectory replacement [s]
      read_only: false
      validation:
        bounds<>: [0.0, 10.0]

  stopping_constraints:
    nominal_deceleration:
      type: double
      default_value: 1.0
      description: Nominal deceleration during stopping [m/s^2]
      read_only: false
      validation:
        bounds<>: [0.0, 10.0]
    maximum_deceleration:
      type: double
      default_value: 4.0
      description: Maximum deceleration during stopping [m/s^2]
      read_only: false
      validation:
        bounds<>: [0.0, 10.0]
    jerk_limit:
      type: double
      default_value: 3.0
      description: Jerk limit during stopping [m/s^3]
      read_only: false
      validation:
        bounds<>: [0.0, 10.0]
    arrived_distance_threshold:
      type: double
      default_value: 0.5
      description: Threshold to check if the ego vehicle has arrived at the stop point [m]
      validation:
        bounds<>: [0.0, 10.0]
      read_only: false

  obstacle_stop:
    use_objects:
      type: bool
      default_value: true
      description: Enable the use of objects for obstacle stop
      read_only: false
    use_pointcloud:
      type: bool
      default_value: true
      description: Enable the use of pointcloud for obstacle stop
      read_only: false
    enable_stop_for_objects:
      type: bool
      default_value: true
      description: Enable stopping behavior when object is detected as obstacle
      read_only: false
    enable_stop_for_pointcloud:
      type: bool
      default_value: false
      description: Enable stopping behavior when pointcloud is detected as obstacle
      read_only: false
    stop_margin:
      type: double
      default_value: 6.0
      description: Distance to maintain from an obstacle when stopped [m]
      validation:
        bounds<>: [0.0, 100.0]
      read_only: false
    lateral_margin:
      type: double
      default_value: 0.5
      description: Lateral margin on top of ego width from trajectory to consider for obstacle stop [m]
      validation:
        bounds<>: [0.0, 10.0]
      read_only: false
    duplicate_check_threshold:
      type: double
      default_value: 0.5
      description: Threshold to check if the stop point is already in the trajectory [m]
      validation:
        bounds<>: [0.0, 10.0]
      read_only: false

    obstacle_tracking:
      on_time_buffer:
        type: double
        default_value: 0.5
        description: Continuous detection duration to consider object/pointcloud to be persistent [s]
        validation:
          bounds<>: [0.0, 5.0]
        read_only: false
      off_time_buffer:
        type: double
        default_value: 1.0
        description: Continuous non-detection duration to consider object/pointcloud as not persistent [s]
        validation:
          bounds<>: [0.0, 5.0]
        read_only: false
      object_distance_th:
        type: double
        default_value: 1.0
        description: Distance threshold for object tracking [m]
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      object_yaw_th:
        type: double
        default_value: 0.1745
        description: Yaw threshold for object tracking [rad]
        validation:
          bounds<>: [0.0, 3.14]
        read_only: false
      pcd_distance_th:
        type: double
        default_value: 1.0
        description: Distance threshold for pointcloud tracking [m]
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      grace_period:
        type: double
        default_value: 0.2
        description: Grace period for object tracking [s]
        validation:
          bounds<>: [0.0, 1.0]
        read_only: false

    objects:
      object_types:
        type: string_array
        default_value: [car, truck, bus, trailer, motorcycle, bicycle, pedestrian]
        description: Types of objects to consider for obstacle stop
        read_only: false
      max_velocity_th:
        type: double
        default_value: 5.0
        description: Maximum velocity threshold for target object to be considered for obstacle stop [m/s]
        validation:
          bounds<>: [0.0, 100.0]
        read_only: false
      stopped_velocity_th:
        type: double
        default_value: 0.25
        description: Velocity threshold for target object to be considered as stopped [m/s]
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      max_lateral_velocity_th:
        type: double
        default_value: 1.0
        description: Maximum lateral velocity threshold for target object to be considered for obstacle stop [m/s]
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      safety_buffer:
        type: double
        default_value: 0.0
        description: Safety buffer to expand object shape [m]
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
    pointcloud:
      height_buffer:
        type: double
        default_value: 0.5
        description: Height buffer to add above ego height [m]
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      min_height:
        type: double
        default_value: 0.2
        description: Minimum height of pointcloud [m]
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      voxel_grid_filter:
        x:
          type: double
          default_value: 0.2
          validation:
            bounds<>: [0.0, 1.0]
          read_only: false
        y:
          type: double
          default_value: 0.2
          validation:
            bounds<>: [0.0, 1.0]
          read_only: false
        z:
          type: double
          default_value: 0.2
          validation:
            bounds<>: [0.0, 1.0]
          read_only: false
        min_size:
          type: int
          default_value: 3
          validation:
            bounds<>: [1, 100]
          read_only: false
      clustering:
        tolerance:
          type: double
          default_value: 0.2
          description: Distance threshold for clustering points [m]
          validation:
            bounds<>: [0.0, 1.0]
          read_only: false
        min_height:
          type: double
          default_value: 0.5
          validation:
            bounds<>: [0.0, 1.0]
          read_only: false
        min_size:
          type: int
          default_value: 10
          validation:
            bounds<>: [1, 10000]
          read_only: false
        max_size:
          type: int
          default_value: 10000
          validation:
            bounds<>: [1, 10000]
          read_only: false

    rss_params:
      enable:
        type: bool
        default_value: true
        description: Enable the use of RSS parameters for obstacle stop
        read_only: false
      object_decel:
        car:
          type: double
          default_value: 1.5
          description: Deceleration for car type objects [m/s^2]
          validation:
            bounds<>: [0.0, 10.0]
          read_only: false
        truck:
          type: double
          default_value: 1.5
          description: Deceleration for truck type objects [m/s^2]
          validation:
            bounds<>: [0.0, 10.0]
          read_only: false
        bus:
          type: double
          default_value: 1.5
          description: Deceleration for bus type objects [m/s^2]
          validation:
            bounds<>: [0.0, 10.0]
          read_only: false
        trailer:
          type: double
          default_value: 1.5
          description: Deceleration for trailer type objects [m/s^2]
          validation:
            bounds<>: [0.0, 10.0]
          read_only: false
        motorcycle:
          type: double
          default_value: 3.0
          description: Deceleration for motorcycle type objects [m/s^2]
          validation:
            bounds<>: [0.0, 10.0]
          read_only: false
        bicycle:
          type: double
          default_value: 5.0
          description: Deceleration for bicycle type objects [m/s^2]
          validation:
            bounds<>: [0.0, 10.0]
          read_only: false
        pedestrian:
          type: double
          default_value: 5.0
          description: Deceleration for pedestrian type objects [m/s^2]
          validation:
            bounds<>: [0.0, 10.0]
          read_only: false
      ego_decel:
        type: double
        default_value: 4.0
        description: Deceleration for ego vehicle [m/s^2]
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      reaction_time:
        type: double
        default_value: 0.2
        description: Reaction time to consider for RSS calculation [s]
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      safety_margin:
        type: double
        default_value: 2.0
        description: Safety margin to consider for RSS calculation [m]
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      lookahead_horizon:
        type: double
        default_value: 1.5
        description: lookahead horizon for RSS calculation [s]
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false

  surround_obstacle_stop:
    use_objects:
      type: bool
      default_value: true
      description: Enable the use of objects for surround obstacle stop
      read_only: false
    use_pointcloud:
      type: bool
      default_value: true
      description: Enable the use of pointcloud for surround obstacle stop
      read_only: false
    object_types:
      type: string_array
      default_value: [car, truck, bus, trailer, motorcycle, bicycle, pedestrian]
      description: Types of objects to consider for surround obstacle stop
      read_only: false
    front_distance_th:
      car:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      truck:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      bus:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      trailer:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      motorcycle:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      bicycle:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      pedestrian:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      unknown:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      pointcloud:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
    side_distance_th:
      car:
        type: double
        default_value: 0.0
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      truck:
        type: double
        default_value: 0.0
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      bus:
        type: double
        default_value: 0.0
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      trailer:
        type: double
        default_value: 0.0
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      motorcycle:
        type: double
        default_value: 1.0
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      bicycle:
        type: double
        default_value: 1.0
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      pedestrian:
        type: double
        default_value: 1.0
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      unknown:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      pointcloud:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
    back_distance_th:
      car:
        type: double
        default_value: 0.0
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      truck:
        type: double
        default_value: 0.0
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      bus:
        type: double
        default_value: 0.0
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      trailer:
        type: double
        default_value: 0.0
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      motorcycle:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      bicycle:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      pedestrian:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      unknown:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
      pointcloud:
        type: double
        default_value: 0.5
        validation:
          bounds<>: [0.0, 10.0]
        read_only: false
    hysteresis_distance:
      type: double
      default_value: 0.1
      description: Distance hysteresis threshold for clearing stop [m]
      validation:
        bounds<>: [0.0, 10.0]
      read_only: false
    hysteresis_time:
      type: double
      default_value: 0.2
      description: Time hysteresis threshold for clearing stop [s]
      validation:
        bounds<>: [0.0, 10.0]
      read_only: false
    ego_stopped_vel_th:
      type: double
      default_value: 0.1
      description: Velocity threshold below which ego vehicle is considered stopped [m/s]
      validation:
        bounds<>: [0.0, 10.0]
      read_only: false
  traffic_light_stop:
    stop_margin:
      type: double
      default_value: 0.75
      description: Distance to maintain from a traffic light when stopped [m]
      validation:
        bounds<>: [0.0, 100.0]
      read_only: false
    stop_for_red_light:
      type: bool
      default_value: true
      description: Enable stopping behavior when red light is detected
      read_only: false
    stop_for_amber_light:
      type: bool
      default_value: false
      description: Enable stopping behavior when amber light is detected
      read_only: false
    treat_amber_light_as_red:
      type: bool
      default_value: false
      description: Treat amber light as red light
      read_only: false
    treat_unknown_light_as_red:
      type: bool
      default_value: false
      description: Treat unknown light as red light
      read_only: false
    overshoot_tolerance:
      type: double
      default_value: 0.5
      description: Tolerance for overshoot [m]
      validation:
        bounds<>: [0.0, 10.0]
      read_only: false
    th_stable_duration_red:
      type: double
      default_value: 0.2
      description: Threshold for stable duration of red light [s]
      validation:
        bounds<>: [0.0, 10.0]
      read_only: false
    th_stable_duration_amber:
      type: double
      default_value: 0.2
      description: Threshold for stable duration of amber light [s]
      validation:
        bounds<>: [0.0, 10.0]
      read_only: false
    th_amber_rejection_hysteresis:
      type: double
      default_value: 0.5
      description: Threshold for amber rejection hysteresis [s]
      validation:
        bounds<>: [0.0, 10.0]
      read_only: false
    crossing_time_limit:
      type: double
      default_value: 2.75
      description: Crossing time limit [s]
      validation:
        bounds<>: [0.0, 10.0]
      read_only: false
