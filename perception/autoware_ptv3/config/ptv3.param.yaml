/**:
  ros__parameters:
    # plugins
    plugins_path: $(find-pkg-share autoware_tensorrt_plugins)/plugins/libautoware_tensorrt_plugins.so
    # network
    trt_precision: fp16
    cloud_capacity: 2000000
    backbone:
      onnx_path: "$(var model_path)/$(var model_variant)_backbone.onnx"
      engine_path: "$(var model_path)/$(var model_variant)_backbone.engine"
    segmentation3d:
      use_head: $(var use_seg3d_head)
      onnx_path: "$(var model_path)/$(var model_variant)_seg3d_head.onnx"
      engine_path: "$(var model_path)/$(var model_variant)_seg3d_head.engine"
      source_reconstruction: "full"
      filter:
        class_probability_threshold: 0.05
        classes: ["drivable_flat"]
        output_format: ""
